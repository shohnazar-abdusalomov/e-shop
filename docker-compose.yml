version: '3.8'

services:
  eshop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eshop-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/letsencrypt:ro  # SSL certificates
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - eshop-network

  # Optional: Database (MongoDB example)
  # mongodb:
  #   image: mongo:6.0
  #   container_name: eshop-db
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: root
  #     MONGO_INITDB_ROOT_PASSWORD: password123
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo-data:/data/db
  #   networks:
  #     - eshop-network

  # Optional: Redis Cache
  # redis:
  #   image: redis:7-alpine
  #   container_name: eshop-cache
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - eshop-network

networks:
  eshop-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
